<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioAccess - Base de Datos</title>
    <script>
        if (!localStorage.getItem('bioaccess_token')) { window.location.href = 'login.html'; }
        function cerrarSesion() { localStorage.removeItem('bioaccess_token'); window.location.href = 'login.html'; }
    </script>
    <style>
        :root { --bg-color: #F8F9FA; --sidebar-color: #212529; --primary-color: #007BFF; --text-dark: #333333; --text-light: #999999; }
        body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; display: flex; background-color: var(--bg-color); min-height: 100vh; }
        
        /* MENÚ LATERAL (PC) */
        .sidebar { 
            width: 260px; background-color: var(--sidebar-color); color: white; height: 100vh; 
            padding: 20px; display: flex; flex-direction: column; box-sizing: border-box; position: fixed; z-index: 1000;
        }
        .logo h1 { font-size: 24px; margin-top: 0; margin-bottom: 40px; text-align: center; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .nav-links a { text-decoration: none; color: #CCCCCC; padding: 12px 15px; display: block; margin-bottom: 5px; border-radius: 8px; font-weight: 500; transition: 0.2s; }
        .nav-links a:hover { color: white; }
        .nav-links a.active { background-color: var(--primary-color); color: white; }
        
        /* ÁREA PRINCIPAL */
        .main-content { flex: 1; margin-left: 260px; padding: 40px; width: 100%; box-sizing: border-box; transition: 0.3s; }
        .title-section h1 { font-size: 24px; color: var(--text-dark); margin: 0; }
        .sub { color: var(--text-light); margin-bottom: 25px; font-weight: 500; font-size: 14px; }
        
        /* BARRA DE FILTROS */
        .filter-bar {
            display: flex; gap: 15px; margin-bottom: 25px; background: white; 
            padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.03);
            align-items: flex-end; flex-wrap: wrap;
        }
        .filter-group { display: flex; flex-direction: column; flex: 1; min-width: 140px; }
        .filter-group label { font-size: 12px; color: var(--text-dark); margin-bottom: 8px; font-weight: 600; }
        .filter-group input, .filter-group select {
            padding: 10px; border: 1px solid #DDDDDD; border-radius: 8px;
            font-size: 14px; color: var(--text-dark); background-color: #FAFAFA; outline: none;
        }
        
        .btn-clear {
            background-color: #E0E0E0; color: #333; border: none; padding: 10px 20px;
            border-radius: 8px; font-weight: bold; cursor: pointer; height: 40px; transition: 0.2s; flex-grow: 0;
        }

        /* TABLA */
        .history-section { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.03); max-height: 60vh; overflow-y: auto; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; color: var(--text-light); font-size: 13px; font-weight: 600; padding: 12px; border-bottom: 2px solid #EEEEEE; position: sticky; top: 0; background: white;}
        td { padding: 15px 12px; color: var(--text-dark); font-size: 14px; border-bottom: 1px solid #F5F5F5; }
        
        .depto-badge { background-color: #F0F4F8; color: #555; padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; }
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }
        .status-badge.concedido { background-color: #E6F8EF; color: #178351; }
        .status-badge.denegado { background-color: #F8E6E6; color: #A32929; }

        /* --- MÓVIL --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; padding: 10px; }
            .logo h1 { margin-bottom: 10px; padding-bottom: 10px; font-size: 20px; border-bottom: none; }
            .nav-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; }
            .nav-links a { padding: 8px 12px; font-size: 13px; margin-bottom: 0; }
            .main-content { margin-left: 0; padding: 20px; }
            .filter-bar { padding: 15px; }
            .filter-group { min-width: 100%; }
            .btn-clear { width: 100%; margin-top: 10px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo"><h1>BioAccess</h1></div>
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="usuarios.html">Usuarios</a>
            <a href="historial.html" class="active">Base de Datos</a>
            <a href="#" onclick="cerrarSesion()" style="color: #ff4d4d;">🚪 Salir</a>
        </div>
    </div>

    <div class="main-content">
        <div class="title-section">
            <h1>Auditoría de Accesos</h1>
            <p class="sub">Historial completo de la base de datos.</p>
        </div>

        <div class="filter-bar">
            <div class="filter-group">
                <label>Búsqueda</label>
                <input type="text" id="filtro-texto" placeholder="Nombre o ID...">
            </div>
            <div class="filter-group">
                <label>Depto.</label>
                <select id="filtro-depto">
                    <option value="">Todos</option>
                    <option value="DR">DR</option><option value="DQA">DQA</option>
                    <option value="SQA">SQA</option><option value="IOP">IOP</option>
                    <option value="Electrical">Electrical</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Estado</label>
                <select id="filtro-estado">
                    <option value="">Todos</option>
                    <option value="Concedido">Concedido</option>
                    <option value="Denegado">Denegado</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Fecha</label>
                <input type="date" id="filtro-fecha">
            </div>
            <button class="btn-clear" onclick="limpiarFiltros()">Limpiar</button>
        </div>

        <div class="history-section">
            <table id="tabla-export">
                <thead>
                    <tr>
                        <th>N°</th>
                        <th>Huella ID</th>
                        <th>Empleado</th>
                        <th>Depto</th>
                        <th>Fecha y Hora</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="tabla-completa">
                    <tr><td colspan="6" style="text-align: center; color: #999;">Cargando historial...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let baseDeDatosGlobal = [];

        async function cargarHistorialCompleto() {
            try {
                const respuesta = await fetch('/api/historial-completo');
                baseDeDatosGlobal = await respuesta.json();
                aplicarFiltros();
            } catch (error) { console.error('Error:', error); }
        }

        function aplicarFiltros() {
            const texto = document.getElementById('filtro-texto').value.toLowerCase();
            const depto = document.getElementById('filtro-depto').value;
            const estado = document.getElementById('filtro-estado').value;
            const fecha = document.getElementById('filtro-fecha').value;

            const datosFiltrados = baseDeDatosGlobal.filter(reg => {
                const coincideTexto = reg.nombre.toLowerCase().includes(texto) || String(reg.huella_id).includes(texto);
                const coincideDepto = (depto === "") || (reg.departamento === depto);
                const coincideEstado = (estado === "") || (reg.estado === estado);
                const fechaDB = new Date(reg.fecha_hora).toISOString().split('T')[0];
                const coincideFecha = (fecha === "") || (fechaDB === fecha);
                return coincideTexto && coincideDepto && coincideEstado && coincideFecha;
            });
            renderizarTabla(datosFiltrados);
        }

        function renderizarTabla(datos) {
            const tabla = document.getElementById('tabla-completa');
            tabla.innerHTML = ''; 
            if (datos.length === 0) {
                tabla.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 20px;">Sin resultados.</td></tr>';
                return;
            }
            datos.forEach(reg => {
                const fecha = new Date(reg.fecha_hora).toLocaleString([], { dateStyle: 'short', timeStyle: 'short' });
                const colorBadge = reg.estado === 'Concedido' ? 'status-badge concedido' : 'status-badge denegado';
                tabla.innerHTML += `
                    <tr>
                        <td style="color: #999;">${reg.id_registro}</td>
                        <td style="font-weight: 700; color: var(--primary-color);">#${reg.huella_id}</td>
                        <td style="font-weight: 600;">${reg.nombre}</td>
                        <td><span class="depto-badge">${reg.departamento}</span></td>
                        <td style="font-size: 13px;">${fecha}</td>
                        <td><span class="${colorBadge}">${reg.estado}</span></td>
                    </tr>
                `;
            });
        }

        function limpiarFiltros() {
            document.getElementById('filtro-texto').value = '';
            document.getElementById('filtro-depto').value = '';
            document.getElementById('filtro-estado').value = '';
            document.getElementById('filtro-fecha').value = '';
            aplicarFiltros();
        }

        document.getElementById('filtro-texto').addEventListener('input', aplicarFiltros);
        document.getElementById('filtro-depto').addEventListener('change', aplicarFiltros);
        document.getElementById('filtro-estado').addEventListener('change', aplicarFiltros);
        document.getElementById('filtro-fecha').addEventListener('change', aplicarFiltros);

        cargarHistorialCompleto();
    </script>
</body>
</html>
