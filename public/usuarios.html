<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioAccess - Usuarios</title>

    <script>
        if (!localStorage.getItem('bioaccess_token')) {
            window.location.href = 'login.html';
        }
        function cerrarSesion() {
            localStorage.removeItem('bioaccess_token');
            window.location.href = 'login.html';
        }
    </script>

    <style>
        :root {
            --bg-color: #F8F9FA;
            --sidebar-color: #212529;
            --primary-color: #007BFF;
            --text-dark: #333333;
            --text-light: #999999;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            background-color: var(--bg-color);
            min-height: 100vh;
        }

        /* --- SIDEBAR (PC) --- */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-color);
            color: white;
            height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            position: fixed;
            z-index: 1000;
        }

        .logo h1 {
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 40px;
            text-align: center;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: #CCCCCC;
            padding: 12px 15px;
            display: block;
            margin-bottom: 5px;
            border-radius: 8px;
            font-weight: 500;
            transition: 0.2s;
        }

        .nav-links a:hover { color: white; }
        .nav-links a.active {
            background-color: var(--primary-color);
            color: white;
        }

        /* --- ÁREA PRINCIPAL --- */
        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 40px;
            width: 100%;
            box-sizing: border-box;
        }

        .title-section h1 { font-size: 24px; color: var(--text-dark); margin: 0; }
        .sub { color: var(--text-light); margin-bottom: 30px; font-size: 14px; }

        /* GRID PRINCIPAL */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
            height: fit-content;
        }

        .card h2 {
            margin-top: 0;
            font-size: 18px;
            margin-bottom: 25px;
            color: var(--text-dark);
            border-bottom: 1px solid #EEE;
            padding-bottom: 15px;
        }

        /* FORMULARIO */
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 8px; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #DDDDDD;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .btn-submit {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
        }

        /* TABLA */
        .table-wrapper {
            max-height: 400px;
            overflow-y: auto;
            overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; min-width: 400px; }
        th { text-align: left; color: var(--text-light); font-size: 13px; padding: 12px; border-bottom: 2px solid #EEEEEE; position: sticky; top: 0; background: white; }
        td { padding: 15px 12px; font-size: 14px; border-bottom: 1px solid #F5F5F5; }
        
        .depto-badge { background-color: #F0F4F8; color: #555; padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; }
        .btn-delete { background-color: #fff; color: #ff4d4d; border: 1px solid #ff4d4d; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; }

        /* MODALES */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 350px; text-align: center; }

        /* --- CORRECCIONES PARA MÓVIL (PANTALLAS < 768px) --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                padding: 15px 10px;
                flex-direction: column;
                align-items: center;
            }

            .logo h1 {
                margin-bottom: 15px;
                padding-bottom: 10px;
                font-size: 20px;
                border-bottom: 1px solid #333;
                width: 100%;
            }

            .nav-links {
                display: flex;
                flex-direction: row; /* Menú horizontal en móvil */
                justify-content: space-around;
                width: 100%;
                gap: 5px;
            }

            .nav-links a {
                padding: 10px 5px;
                font-size: 12px; /* Texto más pequeño para que quepa */
                margin-bottom: 0;
                flex: 1;
                text-align: center;
            }

            .main-content {
                margin-left: 0;
                padding: 15px; /* Menos espacio en los bordes */
            }

            .content-grid {
                grid-template-columns: 1fr; /* Una sola columna: Formulario arriba, Tabla abajo */
                gap: 20px;
            }

            .card {
                padding: 15px;
            }

            .title-section h1 { font-size: 20px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">
            <h1>BioAccess</h1>
        </div>
        <div class="nav-links">
            <a href="index.html">Dash</a>
            <a href="usuarios.html" class="active">Usuarios</a>
            <a href="historial.html">Datos</a>
            <a href="#" onclick="cerrarSesion()" style="color: #ff4d4d;">Salir</a>
        </div>
    </div>

    <div class="main-content">
        <div class="title-section">
            <h1>Gestión de Usuarios</h1>
            <p class="sub">Registra y administra las huellas en Foxconn</p>
        </div>

        <div class="content-grid">
            <div class="card">
                <h2>Registrar Nuevo</h2>
                <form id="form-registro">
                    <div class="form-group">
                        <label>Nombre Completo</label>
                        <input type="text" id="nombre" placeholder="Ej. Armando Tepale" required>
                    </div>
                    <div class="form-group">
                        <label>Departamento</label>
                        <select id="departamento">
                            <option value="DR">DR</option>
                            <option value="DQA">DQA</option>
                            <option value="SQA">SQA</option>
                            <option value="IOP">IOP</option>
                            <option value="Electrical">Electrical</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>ID de Huella</label>
                        <input type="number" id="huella_id" placeholder="Ej: 1, 2, 3..." required>
                    </div>
                    <button type="submit" class="btn-submit">Guardar y Enrolar</button>
                </form>
            </div>

            <div class="card">
                <h2>Historial de Registros</h2>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody id="lista-usuarios">
                            <tr><td colspan="3" style="text-align: center;">Cargando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-eliminar" class="modal-overlay">
        <div class="modal-content">
            <h3>⚠️ Confirmar Baja</h3>
            <p>¿Eliminar al usuario <strong id="nombre-eliminar"></strong>?</p>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button onclick="cerrarModal()" style="padding: 10px 20px; border-radius: 8px; border: none; background: #eee; cursor: pointer;">No</button>
                <button onclick="confirmarEliminar()" style="padding: 10px 20px; border-radius: 8px; border: none; background: #ff4d4d; color: white; cursor: pointer;">Sí</button>
            </div>
        </div>
    </div>

    <div id="modal-alerta" class="modal-overlay">
        <div class="modal-content">
            <h3 id="alerta-titulo">Aviso</h3>
            <p id="alerta-mensaje"></p>
            <button class="btn-submit" onclick="cerrarAlerta()">Entendido</button>
        </div>
    </div>

    <script>
        let idParaBorrar = null;

        function mostrarAlerta(titulo, mensaje, esError = false) {
            document.getElementById('alerta-titulo').innerText = titulo;
            document.getElementById('alerta-titulo').style.color = esError ? '#ff4d4d' : '#178351';
            document.getElementById('alerta-mensaje').innerText = mensaje;
            document.getElementById('modal-alerta').style.display = 'flex';
        }

        function cerrarAlerta() { document.getElementById('modal-alerta').style.display = 'none'; }

        async function obtenerUsuarios() {
            try {
                const res = await fetch('/api/lista-usuarios');
                const usuarios = await res.json();
                const tabla = document.getElementById('lista-usuarios');
                tabla.innerHTML = '';
                usuarios.forEach(u => {
                    tabla.innerHTML += `
                        <tr>
                            <td style="font-weight: 700; color: #007BFF;">#${u.huella_id}</td>
                            <td>${u.nombre}</td>
                            <td><button class="btn-delete" onclick="abrirModal(${u.huella_id}, '${u.nombre}')">Borrar</button></td>
                        </tr>
                    `;
                });
            } catch (e) { console.error(e); }
        }

        function abrirModal(id, nombre) {
            idParaBorrar = id;
            document.getElementById('nombre-eliminar').innerText = nombre;
            document.getElementById('modal-eliminar').style.display = 'flex';
        }

        function cerrarModal() { document.getElementById('modal-eliminar').style.display = 'none'; }

        async function confirmarEliminar() {
            const res = await fetch(`/api/eliminar-usuario/${idParaBorrar}`, { method: 'DELETE' });
            if (res.ok) {
                cerrarModal();
                mostrarAlerta('✅ ¡Eliminado!', 'Usuario dado de baja.');
                obtenerUsuarios();
            }
        }

        document.getElementById('form-registro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const datos = {
                nombre: document.getElementById('nombre').value,
                departamento: document.getElementById('departamento').value,
                huella_id: document.getElementById('huella_id').value
            };
            const res = await fetch('/api/registrar-usuario', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            });
            if (res.ok) {
                e.target.reset();
                mostrarAlerta('✅ ¡Éxito!', 'Usuario enrolado.');
                obtenerUsuarios();
            } else {
                mostrarAlerta('❌ Error', 'ID duplicado.', true);
            }
        });

        obtenerUsuarios();
    </script>
</body>
</html>
