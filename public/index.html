<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioAccess - Dashboard</title>

    <script>
        if (!localStorage.getItem('bioaccess_token')) {
            window.location.href = 'login.html';
        }
        function cerrarSesion() {
            localStorage.removeItem('bioaccess_token');
            window.location.href = 'login.html';
        }
    </script>

    <style>
        :root {
            --bg-color: #F8F9FA;
            --sidebar-color: #212529;
            --primary-color: #007BFF;
            --text-dark: #333333;
            --text-light: #999999;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            background-color: var(--bg-color);
            min-height: 100vh;
        }

        /* MENÚ LATERAL (ESCRITORIO) */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-color);
            color: white;
            height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            position: fixed;
            z-index: 1000;
            transition: 0.3s;
        }

        .logo h1 {
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 40px;
            text-align: center;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: #CCCCCC;
            padding: 12px 15px;
            display: block;
            margin-bottom: 5px;
            border-radius: 8px;
            font-weight: 500;
            transition: 0.2s;
        }

        .nav-links a:hover { color: white; }
        .nav-links a.active {
            background-color: var(--primary-color);
            color: white;
        }

        /* ÁREA PRINCIPAL */
        .main-content {
            flex: 1;
            margin-left: 260px; /* Margen para PC */
            padding: 40px;
            transition: 0.3s;
            width: 100%;
            box-sizing: border-box;
        }

        .title-section h1 {
            font-size: 24px;
            color: var(--text-dark);
            margin-top: 0;
            margin-bottom: 30px;
        }

        /* GRILLA DE TARJETAS INDICADORAS */
        .indicators-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .indicator-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
            border-left: 4px solid var(--primary-color);
        }

        .indicator-card:nth-child(2) { border-left-color: #28a745; }
        .indicator-card:nth-child(3) { border-left-color: #ffc107; }

        .icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background-color: #F0F4F8;
        }

        .details h3 {
            margin: 0;
            font-size: 13px;
            color: var(--text-light);
            font-weight: 600;
            text-transform: uppercase;
        }

        .details .value {
            margin: 5px 0 0 0;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-dark);
        }

        /* TABLA DE REGISTROS */
        .history-section {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
            overflow-x: auto;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 500px; 
        }

        th { text-align: left; color: var(--text-light); font-size: 13px; padding: 12px; border-bottom: 2px solid #EEEEEE; }
        td { padding: 15px 12px; color: var(--text-dark); font-size: 14px; border-bottom: 1px solid #F5F5F5; }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
        }

        .status-badge.concedido { background-color: #E6F8EF; color: #178351; }
        .status-badge.denegado { background-color: #F8E6E6; color: #A32929; }

        /* --- RESPONSIVE / AJUSTES PARA CELULAR --- */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                padding: 10px;
            }

            .logo h1 {
                margin-bottom: 15px;
                padding-bottom: 10px;
                font-size: 20px;
            }

            .nav-links {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 5px;
            }

            .nav-links a {
                padding: 8px 12px;
                margin-bottom: 0;
                font-size: 13px;
                flex: 1 1 auto;
                text-align: center;
            }

            .main-content {
                margin-left: 0;
                padding: 20px;
            }

            .indicators-grid {
                grid-template-columns: 1fr;
            }

            .title-section h1 {
                font-size: 20px;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">
            <h1>BioAccess</h1>
        </div>
        <div class="nav-links">
            <a href="index.html" class="active">Dashboard</a>
            <a href="usuarios.html">Usuarios</a>
            <a href="historial.html">Base de Datos</a>
            <a href="#" onclick="cerrarSesion()" style="color: #ff4d4d;">🚪 Salir</a>
        </div>
    </div>

    <div class="main-content">
        <div class="title-section">
            <h1>Monitoreo Real-Time</h1>
        </div>
        
        <div class="indicators-grid">
            <div class="indicator-card">
                <div class="icon">💻</div>
                <div class="details">
                    <h3>Sistema</h3>
                    <p class="value" id="stat-sistema" style="color: var(--primary-color);">Online</p>
                </div>
            </div>
            <div class="indicator-card">
                <div class="icon">📊</div>
                <div class="details">
                    <h3>Accesos Hoy</h3>
                    <p class="value" id="stat-total">0</p>
                </div>
            </div>
            <div class="indicator-card">
                <div class="icon">👤</div>
                <div class="details">
                    <h3>Último</h3>
                    <p class="value" id="stat-ultimo">--</p>
                </div>
            </div>
        </div>

        <div class="history-section">
            <div class="section-header">
                <h2>Últimos Accesos</h2>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Usuario</th>
                        <th>Hora</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="tabla-accesos">
                    <tr>
                        <td colspan="4" style="text-align: center; color: #999;">Cargando...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

  <script>
        // 1. Conexión WebSocket
        const socket = io();

        // 2. Fijamos el indicador de sistema permanentemente (Adiós al parpadeo)
        const statSistema = document.getElementById('stat-sistema');
        statSistema.innerText = "Online";
        statSistema.style.color = "var(--primary-color)";

        // 3. Función inicial de carga
       // 3. Función inicial de carga (Versión Blindada a prueba de fallos)
        async function cargarDatosIniciales() {
            const tabla = document.getElementById('tabla-accesos');
            const statSistema = document.getElementById('stat-sistema');

            try {
                // --- FASE 1: CARGAR LA TABLA (CRÍTICO) ---
                const resHistorial = await fetch('/api/historial');
                if (!resHistorial.ok) throw new Error("Fallo al obtener historial");
                
                const datosHistorial = await resHistorial.json();
                
                if (datosHistorial.length > 0) {
                    document.getElementById('stat-ultimo').innerText = datosHistorial[0].nombre.split(' ')[0]; 
                }

                tabla.innerHTML = ''; 
                if (datosHistorial.length === 0) {
                    tabla.innerHTML = '<tr><td colspan="4" style="text-align: center;">Sin registros</td></tr>';
                } else {
                    datosHistorial.forEach(reg => agregarFilaATabla(reg, false));
                }

                // --- FASE 2: CARGAR CONTADOR DE HOY (SECUNDARIO) ---
                try {
                    const resHoy = await fetch('/api/accesos-hoy');
                    if (resHoy.ok) {
                        const datosHoy = await resHoy.json();
                        document.getElementById('stat-total').innerText = datosHoy.total;
                    } else {
                        console.warn("⚠️ La ruta del contador aún no está lista en el servidor.");
                    }
                } catch (errHoy) {
                    console.error("⚠️ Error silencioso en el contador:", errHoy);
                }

            } catch (error) {
                console.error('❌ Error fatal de carga:', error);
                tabla.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #ff4d4d;">Error de conexión con el servidor</td></tr>';
                statSistema.innerText = "Desconectado";
                statSistema.style.color = "#ff4d4d";
            }
        }

        // 4. Inyección de filas
        function agregarFilaATabla(reg, esNuevoEnVivo) {
            const tabla = document.getElementById('tabla-accesos');
            const fecha = new Date(reg.fecha_hora).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const colorBadge = reg.estado === 'Concedido' ? 'status-badge concedido' : 'status-badge denegado';
            
            const estiloFila = esNuevoEnVivo ? 'style="background-color: #e6ffed; transition: 2s;"' : '';

            const fila = `
                <tr ${estiloFila}>
                    <td style="font-weight: 700; color: #007BFF;">#${reg.huella_id}</td>
                    <td>${reg.nombre}</td>
                    <td>${fecha}</td>
                    <td><span class="${colorBadge}">${reg.estado}</span></td>
                </tr>
            `;

            if (esNuevoEnVivo) {
                // Insertamos arriba
                tabla.insertAdjacentHTML('afterbegin', fila);
                
                // Sumamos 1 al contador real "Accesos Hoy" instantáneamente
                const totalActual = parseInt(document.getElementById('stat-total').innerText) || 0;
                document.getElementById('stat-total').innerText = totalActual + 1;
                
                document.getElementById('stat-ultimo').innerText = reg.nombre.split(' ')[0];
                
                // Mantenemos la tabla limpia: si hay más de 10 filas, borramos la última
                if (tabla.rows.length > 10) {
                    tabla.deleteRow(10);
                }
            } else {
                tabla.innerHTML += fila; 
            }
        }

        // 5. Escuchando al ESP32 en vivo
        socket.on('nuevo_acceso', (nuevoRegistro) => {
            const tabla = document.getElementById('tabla-accesos');
            if(tabla.innerText.includes("Sin registros")) tabla.innerHTML = '';
            
            agregarFilaATabla(nuevoRegistro, true);
        });

        // Arrancamos todo
        cargarDatosIniciales();
    </script>
</body>
</html>
